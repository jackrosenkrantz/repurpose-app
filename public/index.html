<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repurpose</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    html { color-scheme: dark; }
    :root {
      --sand: #1a1714;
      --stone: #3d352f;
      --warm-gray: #7a726b;
      --earth: #9a918a;
      --deep: #e8e0d8;
      --sage: #7a8b6f;
      --amber: #c4956a;
      --amber-light: #2e2418;
      --card: #242019;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      background: var(--sand);
      color: var(--deep);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    h1, h2, h3 { font-family: 'Lora', serif; font-weight: 400; }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Header */
    .header {
      padding: 40px 20px 12px;
      text-align: center;
    }
    .header h1 {
      font-size: 1.6rem;
      color: var(--deep);
      margin-bottom: 4px;
    }
    .header p {
      color: var(--earth);
      font-size: 0.8rem;
      font-weight: 300;
    }

    /* Card base */
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
    }
    .card-label {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--warm-gray);
      margin-bottom: 10px;
    }

    /* Input section */
    .input-card textarea {
      width: 100%;
      min-height: 140px;
      background: transparent;
      border: 1px solid var(--stone);
      border-radius: 8px;
      color: var(--deep);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.9rem;
      line-height: 1.6;
      padding: 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-card textarea:focus { border-color: var(--amber); }
    .input-card textarea::placeholder { color: var(--warm-gray); font-style: italic; }

    .input-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }
    .char-count {
      font-size: 0.7rem;
      color: var(--warm-gray);
    }

    .input-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .coaching-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      color: var(--earth);
      cursor: pointer;
    }
    .coaching-toggle input {
      accent-color: var(--amber);
      cursor: pointer;
    }

    .btn-repurpose {
      padding: 10px 24px;
      background: var(--amber);
      color: var(--sand);
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-repurpose:hover { opacity: 0.9; }
    .btn-repurpose:disabled {
      background: var(--stone);
      color: var(--warm-gray);
      cursor: not-allowed;
    }

    /* Status */
    .status {
      text-align: center;
      padding: 40px 20px;
      display: none;
    }
    .status.visible { display: block; }
    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--stone);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-text {
      font-size: 0.85rem;
      color: var(--earth);
    }

    /* Output section */
    .outputs { display: none; }
    .outputs.visible { display: block; }

    /* Brief card */
    .brief-card {
      border-left: 3px solid var(--amber);
      margin-bottom: 20px;
    }
    .brief-insight {
      font-family: 'Lora', serif;
      font-size: 1.05rem;
      line-height: 1.5;
      color: var(--deep);
      margin-bottom: 12px;
    }
    .brief-meta {
      font-size: 0.78rem;
      color: var(--earth);
      line-height: 1.6;
    }
    .brief-meta span { color: var(--warm-gray); }
    .brief-quotes {
      margin-top: 12px;
      padding-left: 14px;
      border-left: 2px solid var(--stone);
    }
    .brief-quotes p {
      font-size: 0.82rem;
      font-style: italic;
      color: var(--earth);
      margin-bottom: 6px;
      line-height: 1.5;
    }

    /* Variant card */
    .variant-card {
      position: relative;
    }
    .variant-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .variant-type {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--warm-gray);
    }
    .variant-actions {
      display: flex;
      gap: 6px;
    }
    .btn-sm {
      padding: 5px 12px;
      border: 1px solid var(--stone);
      border-radius: 100px;
      background: transparent;
      color: var(--earth);
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-sm:hover { border-color: var(--amber); color: var(--amber); }
    .btn-sm.copied { border-color: var(--sage); color: var(--sage); }
    .btn-sm.saved { border-color: var(--sage); color: var(--sage); }
    .btn-sm.publishing { border-color: var(--amber); color: var(--amber); opacity: 0.7; cursor: wait; }

    /* Publish panel */
    .publish-panel {
      margin-top: 12px;
      padding: 16px;
      background: var(--sand);
      border: 1px solid var(--stone);
      border-radius: 8px;
      display: none;
    }
    .publish-panel.open { display: block; }
    .publish-panel .card-label { margin-bottom: 10px; }

    .platform-toggles {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .platform-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border: 1px solid var(--stone);
      border-radius: 100px;
      cursor: pointer;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--earth);
      transition: all 0.2s;
      user-select: none;
    }
    .platform-toggle.active { border-color: var(--amber); color: var(--amber); background: var(--amber-light); }
    .platform-toggle.disabled { opacity: 0.3; cursor: not-allowed; }
    .platform-toggle input { display: none; }

    .publish-btn {
      padding: 8px 20px;
      background: var(--amber);
      color: var(--sand);
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .publish-btn:hover { opacity: 0.9; }
    .publish-btn:disabled { background: var(--stone); color: var(--warm-gray); cursor: not-allowed; }

    .publish-status {
      margin-top: 10px;
    }
    .publish-status-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 0.75rem;
      color: var(--earth);
    }
    .publish-status-item .platform-name {
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.65rem;
      min-width: 70px;
    }
    .publish-status-item .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--stone);
    }
    .publish-status-item .status-dot.pending { background: var(--warm-gray); }
    .publish-status-item .status-dot.publishing { background: var(--amber); animation: pulse 1s ease infinite; }
    .publish-status-item .status-dot.published { background: var(--sage); }
    .publish-status-item .status-dot.failed { background: #c46a6a; }
    .publish-status-item .status-dot.skipped { background: var(--warm-gray); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* API key setup */
    .api-key-setup {
      margin-top: 12px;
      padding: 12px;
      background: var(--card);
      border-radius: 8px;
      font-size: 0.75rem;
      color: var(--earth);
    }
    .api-key-setup input {
      width: 100%;
      margin-top: 6px;
      padding: 8px 10px;
      background: transparent;
      border: 1px solid var(--stone);
      border-radius: 6px;
      color: var(--deep);
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      outline: none;
    }
    .api-key-setup input:focus { border-color: var(--amber); }

    .variant-text {
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--deep);
      white-space: pre-wrap;
    }

    /* Comments & recs cards */
    .extras-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }
    .extras-card {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
    }
    .extras-card .card-label { margin-bottom: 8px; }
    .extras-item {
      margin-bottom: 10px;
    }
    .extras-item:last-child { margin-bottom: 0; }
    .extras-item-label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 4px;
    }
    .extras-item-text {
      font-size: 0.8rem;
      line-height: 1.5;
      color: var(--earth);
    }

    /* History */
    .history-section {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--stone);
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .history-header h3 {
      font-size: 0.95rem;
      color: var(--earth);
    }
    .history-list { display: none; }
    .history-list.open { display: block; }
    .history-item {
      padding: 12px 16px;
      background: var(--card);
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .history-item:hover { border-left: 3px solid var(--amber); }
    .h-preview {
      font-size: 0.8rem;
      color: var(--deep);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .h-date {
      font-size: 0.65rem;
      color: var(--warm-gray);
      margin-left: 12px;
      white-space: nowrap;
    }
    .btn-toggle {
      padding: 5px 14px;
      border: 1px solid var(--stone);
      border-radius: 100px;
      background: transparent;
      color: var(--earth);
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-toggle:hover { border-color: var(--amber); color: var(--amber); }

    /* Bottom nav */
    nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(26, 23, 20, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--stone);
      padding: 10px 16px 14px;
      display: flex;
      justify-content: center;
      gap: 6px;
    }
    nav a {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--warm-gray);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    nav a:hover { color: var(--amber); border-color: var(--stone); }
    nav a.active {
      color: var(--amber);
      border-color: var(--stone);
      background: var(--amber-light);
    }

    /* Fade in animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeUp 0.5s ease both;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .header h1 { font-size: 1.3rem; }
      .extras-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Repurpose</h1>
    <p>One piece of content, five ready-to-ship variants.</p>
  </div>

  <div class="container">

    <!-- Input -->
    <div class="card input-card" id="inputSection">
      <div class="card-label">Content</div>
      <textarea id="contentInput" placeholder="Paste content, a topic, or a prompt..."></textarea>
      <div class="input-meta">
        <span class="char-count" id="charCount">0</span>
        <div class="input-actions">
          <label class="coaching-toggle">
            <input type="checkbox" id="coachingToggle">
            Privacy filter
          </label>
          <button class="btn-repurpose" id="repurposeBtn" onclick="repurpose()">Repurpose</button>
        </div>
      </div>
    </div>

    <!-- Status -->
    <div class="status" id="status">
      <div class="spinner"></div>
      <div class="status-text" id="statusText">Generating content...</div>
    </div>

    <!-- Outputs -->
    <div class="outputs" id="outputSection"></div>

    <!-- History -->
    <div class="history-section" id="historySection">
      <div class="history-header">
        <h3>Recent</h3>
        <button class="btn-toggle" onclick="toggleHistory()">Show</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>

  </div>

  <nav>
    <a href="https://anchor-1-production.up.railway.app/">Command Center</a>
    <a href="#" class="active">Repurpose</a>
  </nav>

  <script>
    const API_URL = window.API_URL || 'https://anchor-bot-production.up.railway.app';

    const contentInput = document.getElementById('contentInput');
    const charCount = document.getElementById('charCount');
    const coachingToggle = document.getElementById('coachingToggle');
    const repurposeBtn = document.getElementById('repurposeBtn');
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const outputSection = document.getElementById('outputSection');
    const inputSection = document.getElementById('inputSection');

    let currentJobId = null;

    const V2_ORDER = ['sales', 'poetic', 'radical', 'weekend_bridge', 'short_contrarian'];
    const V2_LABELS = {
      sales: 'Sales', poetic: 'Poetic', radical: 'Radical',
      weekend_bridge: 'Weekend Bridge', short_contrarian: 'Short Contrarian'
    };

    // Char count
    contentInput.addEventListener('input', () => {
      charCount.textContent = contentInput.value.length;
    });

    // Repurpose
    async function repurpose() {
      const text = contentInput.value.trim();
      if (!text || text.length < 50) {
        alert('Need at least 50 characters.');
        return;
      }

      repurposeBtn.disabled = true;
      statusEl.classList.add('visible');
      outputSection.classList.remove('visible');
      outputSection.innerHTML = '';

      const isCoaching = coachingToggle.checked;
      statusText.textContent = isCoaching
        ? 'Privacy filter active... then generating. 30-60 seconds.'
        : 'Generating content... 30-60 seconds.';

      try {
        const resp = await fetch(`${API_URL}/api/repurpose`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, source_type: 'text', is_coaching: isCoaching })
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Request failed');

        currentJobId = data.id;
        renderOutputs(data.outputs);
        saveToHistory(data.id, text);
      } catch (err) {
        statusText.textContent = `Error: ${err.message}`;
        setTimeout(() => statusEl.classList.remove('visible'), 4000);
      } finally {
        repurposeBtn.disabled = false;
      }
    }

    function renderOutputs(outputs) {
      statusEl.classList.remove('visible');
      outputSection.innerHTML = '';
      outputSection.classList.add('visible');

      const isV2 = outputs.format_version === 2 || outputs.variants;
      if (isV2) renderV2(outputs);
      else renderV1(outputs);
    }

    function renderV2(outputs) {
      let delay = 0;

      // Creative Brief
      const brief = outputs.creative_brief;
      if (brief && typeof brief === 'object') {
        const el = document.createElement('div');
        el.className = 'card brief-card fade-in';
        el.style.animationDelay = `${delay}s`;
        delay += 0.08;

        let html = '';
        if (brief.core_insight) {
          html += `<div class="brief-insight">${esc(brief.core_insight)}</div>`;
        }

        const meta = [];
        if (brief.audience) meta.push(`<span>Audience:</span> ${esc(brief.audience)}`);
        if (brief.tension) meta.push(`<span>Tension:</span> ${esc(brief.tension)}`);
        if (meta.length) html += `<div class="brief-meta">${meta.join('<br>')}</div>`;

        if (brief.verbatim_lines && brief.verbatim_lines.length) {
          html += '<div class="brief-quotes">';
          for (const line of brief.verbatim_lines) {
            html += `<p>"${esc(line)}"</p>`;
          }
          html += '</div>';
        }

        el.innerHTML = html;
        outputSection.appendChild(el);
      }

      // Variants
      const variants = outputs.variants || {};
      for (const key of V2_ORDER) {
        const text = variants[key];
        if (!text) continue;

        const el = document.createElement('div');
        el.className = 'card variant-card fade-in';
        el.style.animationDelay = `${delay}s`;
        el.dataset.variantType = key;
        el.dataset.variantText = text;
        delay += 0.08;

        el.innerHTML = `
          <div class="variant-header">
            <div class="variant-type">${V2_LABELS[key] || key}</div>
            <div class="variant-actions">
              <button class="btn-sm" data-action="save" data-type="${key}">Save</button>
              <button class="btn-sm" data-action="copy">Copy</button>
              <button class="btn-sm" data-action="publish">Publish</button>
            </div>
          </div>
          <div class="variant-text">${esc(text)}</div>
          <div class="publish-panel" data-panel="${key}">
            <div class="card-label">Publish to</div>
            <div class="platform-toggles">
              <label class="platform-toggle active" data-platform="x"><input type="checkbox" checked>X</label>
              <label class="platform-toggle active" data-platform="threads"><input type="checkbox" checked>Threads</label>
              <label class="platform-toggle active" data-platform="facebook"><input type="checkbox" checked>Facebook</label>
              <label class="platform-toggle disabled" data-platform="instagram" title="Coming in Phase 2"><input type="checkbox" disabled>Instagram</label>
            </div>
            <button class="publish-btn" data-action="publish-go">Publish Now</button>
            <div class="publish-status"></div>
          </div>
        `;
        outputSection.appendChild(el);
      }

      // Anchor Comments + Image Recs side by side
      const comments = outputs.anchor_comments;
      const recs = outputs.image_recs;

      if ((comments && typeof comments === 'object') || (recs && Array.isArray(recs) && recs.length)) {
        const grid = document.createElement('div');
        grid.className = 'extras-grid fade-in';
        grid.style.animationDelay = `${delay}s`;

        if (comments && typeof comments === 'object') {
          const card = document.createElement('div');
          card.className = 'extras-card';
          let html = '<div class="card-label">Anchor Comments</div>';
          const types = [['engagement', 'Engagement'], ['teaching', 'Teaching'], ['social_proof', 'Social Proof']];
          for (const [k, label] of types) {
            if (comments[k]) {
              html += `<div class="extras-item">
                <div class="extras-item-label">${label}</div>
                <div class="extras-item-text">${esc(comments[k])}</div>
              </div>`;
            }
          }
          card.innerHTML = html;
          grid.appendChild(card);
        }

        if (recs && Array.isArray(recs) && recs.length) {
          const card = document.createElement('div');
          card.className = 'extras-card';
          let html = '<div class="card-label">Image Ideas</div>';
          for (const rec of recs) {
            const rtype = (rec.type || '').replace(/_/g, ' ');
            html += `<div class="extras-item">
              <div class="extras-item-label">${esc(rtype)}</div>
              <div class="extras-item-text">${esc(rec.description || '')}</div>
            </div>`;
          }
          card.innerHTML = html;
          grid.appendChild(card);
        }

        outputSection.appendChild(grid);
      }
    }

    function renderV1(outputs) {
      const labels = {
        linkedin_post: 'LinkedIn Post', twitter_post: 'X Post', threads_post: 'Threads',
        instagram_caption: 'Instagram', newsletter_section: 'Newsletter',
        blog_post: 'Blog Post', blog_excerpt: 'Blog Excerpt', pull_quotes: 'Pull Quotes',
        one_liner: 'One-Liner', cta_variations: 'CTAs'
      };
      for (const [key, label] of Object.entries(labels)) {
        if (!(key in outputs)) continue;
        const val = outputs[key];
        const el = document.createElement('div');
        el.className = 'card variant-card fade-in';

        let display = '';
        let copyVal = '';
        if (key === 'blog_post' && typeof val === 'object') {
          display = `${val.title || ''}\n\n${val.body || ''}`;
          copyVal = display;
        } else if (Array.isArray(val)) {
          display = val.map((v, i) => `${i + 1}. ${v}`).join('\n');
          copyVal = val.join('\n');
        } else {
          display = String(val);
          copyVal = display;
        }

        el.innerHTML = `
          <div class="variant-header">
            <div class="variant-type">${label}</div>
            <div class="variant-actions">
              <button class="btn-sm" onclick="copyText(this, ${JSON.stringify(copyVal).replace(/</g, '\\u003c')})">Copy</button>
            </div>
          </div>
          <div class="variant-text">${esc(display)}</div>
        `;
        outputSection.appendChild(el);
      }
    }

    // Helpers
    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function getPublishKey() {
      return localStorage.getItem('publish_api_key') || '';
    }

    function setPublishKey(key) {
      localStorage.setItem('publish_api_key', key);
    }

    // Event delegation for variant card buttons
    outputSection.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const card = btn.closest('.variant-card');
      if (!card) return;

      const action = btn.dataset.action;
      const text = card.dataset.variantText;
      const type = card.dataset.variantType;

      if (action === 'copy') {
        navigator.clipboard.writeText(text).then(() => {
          btn.textContent = 'Copied';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
        });
      } else if (action === 'save') {
        saveToLibrary(btn, text, type);
      } else if (action === 'publish') {
        togglePublishPanel(card);
      } else if (action === 'publish-go') {
        publishVariant(card, btn);
      }
    });

    // Platform toggle clicks
    outputSection.addEventListener('click', (e) => {
      const toggle = e.target.closest('.platform-toggle:not(.disabled)');
      if (!toggle) return;
      const cb = toggle.querySelector('input');
      cb.checked = !cb.checked;
      toggle.classList.toggle('active', cb.checked);
    });

    function togglePublishPanel(card) {
      const panel = card.querySelector('.publish-panel');
      if (!panel) return;

      // Check for API key
      if (!getPublishKey()) {
        panel.classList.add('open');
        panel.innerHTML = `
          <div class="api-key-setup">
            <div>Enter your publish API key to enable posting:</div>
            <input type="password" placeholder="Paste API key..." data-action="save-key">
          </div>
        `;
        const input = panel.querySelector('input');
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && input.value.trim()) {
            setPublishKey(input.value.trim());
            // Re-render the panel with toggles
            rebuildPublishPanel(card, panel);
          }
        });
        return;
      }

      panel.classList.toggle('open');
    }

    function rebuildPublishPanel(card, panel) {
      const type = card.dataset.variantType;
      panel.innerHTML = `
        <div class="card-label">Publish to</div>
        <div class="platform-toggles">
          <label class="platform-toggle active" data-platform="x"><input type="checkbox" checked>X</label>
          <label class="platform-toggle active" data-platform="threads"><input type="checkbox" checked>Threads</label>
          <label class="platform-toggle active" data-platform="facebook"><input type="checkbox" checked>Facebook</label>
          <label class="platform-toggle disabled" data-platform="instagram" title="Coming in Phase 2"><input type="checkbox" disabled>Instagram</label>
        </div>
        <button class="publish-btn" data-action="publish-go">Publish Now</button>
        <div class="publish-status"></div>
      `;
    }

    async function publishVariant(card, btn) {
      const key = getPublishKey();
      if (!key) return;

      const text = card.dataset.variantText;
      const type = card.dataset.variantType;
      const panel = card.querySelector('.publish-panel');
      const statusDiv = panel.querySelector('.publish-status');

      // Get selected platforms
      const platforms = [];
      panel.querySelectorAll('.platform-toggle.active input:checked').forEach(cb => {
        platforms.push(cb.closest('.platform-toggle').dataset.platform);
      });

      if (!platforms.length) {
        statusDiv.innerHTML = '<div class="publish-status-item" style="color:#c46a6a">Select at least one platform</div>';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Publishing...';

      // Show pending status for each platform
      statusDiv.innerHTML = platforms.map(p =>
        `<div class="publish-status-item" data-platform="${p}">
          <span class="status-dot publishing"></span>
          <span class="platform-name">${p}</span>
          <span class="status-msg">Waiting...</span>
        </div>`
      ).join('');

      try {
        const resp = await fetch(`${API_URL}/api/publish`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Publish-Key': key,
          },
          body: JSON.stringify({
            variant_text: text,
            variant_type: type,
            platforms,
            repurpose_job_id: currentJobId || '',
          }),
        });

        if (resp.status === 401) {
          statusDiv.innerHTML = '<div class="publish-status-item" style="color:#c46a6a">Invalid API key. Check your key and try again.</div>';
          btn.disabled = false;
          btn.textContent = 'Publish Now';
          return;
        }

        if (resp.status === 429) {
          statusDiv.innerHTML = '<div class="publish-status-item" style="color:#c46a6a">Rate limit exceeded. Try again later.</div>';
          btn.disabled = false;
          btn.textContent = 'Publish Now';
          return;
        }

        // Read SSE stream
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          let eventType = '';
          for (const line of lines) {
            if (line.startsWith('event: ')) {
              eventType = line.slice(7).trim();
            } else if (line.startsWith('data: ') && eventType) {
              try {
                const data = JSON.parse(line.slice(6));
                handlePublishEvent(statusDiv, eventType, data);
              } catch {}
              eventType = '';
            }
          }
        }
      } catch (err) {
        statusDiv.innerHTML = `<div class="publish-status-item" style="color:#c46a6a">Error: ${esc(err.message)}</div>`;
      }

      btn.disabled = false;
      btn.textContent = 'Publish Now';
    }

    function handlePublishEvent(statusDiv, event, data) {
      if (event === 'progress') {
        // Update a general status line
        const existing = statusDiv.querySelector('.progress-msg');
        if (existing) {
          existing.textContent = data.message;
        } else {
          const el = document.createElement('div');
          el.className = 'publish-status-item progress-msg';
          el.style.color = 'var(--earth)';
          el.textContent = data.message;
          statusDiv.prepend(el);
        }
      } else if (event === 'adapted') {
        // Show adapted text preview (could expand later)
        const item = statusDiv.querySelector(`[data-platform="${data.platform}"]`);
        if (item) {
          const msg = item.querySelector('.status-msg');
          const preview = (data.text || '').slice(0, 60);
          msg.textContent = preview ? `Adapted: "${preview}..."` : 'Adapted';
        }
      } else if (event === 'result') {
        const item = statusDiv.querySelector(`[data-platform="${data.platform}"]`);
        if (item) {
          const dot = item.querySelector('.status-dot');
          const msg = item.querySelector('.status-msg');
          dot.className = `status-dot ${data.status}`;
          if (data.status === 'published') {
            const url = data.url || '';
            if (url) {
              msg.innerHTML = `<a href="${esc(url)}" target="_blank" rel="noopener" style="color:var(--sage);text-decoration:underline">Published — View</a>`;
            } else {
              msg.textContent = 'Published';
            }
            msg.style.color = 'var(--sage)';
          } else if (data.status === 'failed') {
            msg.textContent = data.error || 'Failed';
            msg.style.color = '#c46a6a';
          } else if (data.status === 'skipped') {
            msg.textContent = data.message || 'Skipped';
          }
        }
      } else if (event === 'complete') {
        const progress = statusDiv.querySelector('.progress-msg');
        if (progress) progress.remove();
      }
    }

    async function saveToLibrary(btn, text, variantType) {
      btn.disabled = true;
      btn.textContent = 'Saving...';
      try {
        const resp = await fetch(`${API_URL}/api/voice-library`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, variant_type: variantType, source: 'repurpose_output' })
        });
        if (resp.ok) {
          btn.textContent = 'Saved';
          btn.classList.add('saved');
        } else {
          btn.textContent = 'Error';
          setTimeout(() => { btn.textContent = 'Save'; btn.disabled = false; }, 2000);
        }
      } catch {
        btn.textContent = 'Error';
        setTimeout(() => { btn.textContent = 'Save'; btn.disabled = false; }, 2000);
      }
    }

    // History — fetches from Supabase via anchor-bot API
    function saveToHistory(id, text) {
      // Refresh the list from server to include the new job
      setTimeout(loadHistory, 1000);
    }

    async function loadHistory() {
      try {
        const resp = await fetch(`${API_URL}/api/repurpose/recent?limit=10`);
        const data = await resp.json();
        if (!resp.ok || !data.jobs) throw new Error('Failed to load');
        renderHistory(data.jobs);
      } catch (err) {
        console.warn('Failed to load recent jobs:', err);
        document.getElementById('historySection').style.display = 'none';
      }
    }

    function renderHistory(jobs) {
      const list = document.getElementById('historyList');
      if (!jobs || !jobs.length) {
        document.getElementById('historySection').style.display = 'none';
        return;
      }
      document.getElementById('historySection').style.display = 'block';
      list.innerHTML = jobs.map(j => `
        <div class="history-item" onclick="loadJob('${j.id}')">
          <div class="h-preview">${esc(j.preview || '(no preview)')}</div>
          <div class="h-date">${new Date(j.created_at).toLocaleDateString()}</div>
        </div>
      `).join('');
    }

    function toggleHistory() {
      const list = document.getElementById('historyList');
      const btn = list.previousElementSibling.querySelector('.btn-toggle');
      list.classList.toggle('open');
      btn.textContent = list.classList.contains('open') ? 'Hide' : 'Show';
    }

    async function loadJob(id) {
      statusEl.classList.add('visible');
      statusText.textContent = 'Loading...';
      outputSection.classList.remove('visible');

      try {
        const resp = await fetch(`${API_URL}/api/repurpose/${id}`);
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Not found');
        currentJobId = id;
        renderOutputs(data.outputs);
      } catch (err) {
        statusText.textContent = `Error: ${err.message}`;
        setTimeout(() => statusEl.classList.remove('visible'), 3000);
      }
    }

    // Init
    loadHistory();
    const jobParam = new URLSearchParams(location.search).get('job');
    if (jobParam) loadJob(jobParam);
  </script>
</body>
